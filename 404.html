<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the Network — Arcadia</title>
    <link rel="icon" type="image/png" href="assets/logo-gold-2.png?v=2">
    <link rel="stylesheet" href="css/base.css?v=0">
    <style>
        .lost {
            min-height: 100dvh;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .lost-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 30px rgba(200, 168, 78, 0.2));
            opacity: 0.6;
        }

        .lost-code {
            font-family: 'Cinzel', serif;
            font-size: 6rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 8px;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(200, 168, 78, 0.2);
        }

        .lost-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: var(--green-light);
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        .lost-message {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 450px;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .lost-home {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--green-bright) 0%, #3a6e3a 100%);
            color: white;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            border: 1px solid var(--green-light);
            box-shadow: 0 0 20px rgba(74, 140, 74, 0.2);
            cursor: pointer;
            min-height: 44px;
        }

        .lost-home:hover {
            background: linear-gradient(135deg, #5a9e5a 0%, var(--green-bright) 100%);
            box-shadow: 0 0 40px rgba(74, 140, 74, 0.4);
            transform: translateY(-2px);
        }

        .lost-vine {
            position: absolute;
            bottom: 2rem;
            color: var(--text-dim);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.9rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="lost">
        <img src="assets/logo-gold-2.png?v=2" alt="Arcadia" class="lost-logo">
        <div class="lost-code">404</div>
        <p class="lost-title">This path doesn't lead anywhere yet</p>
        <p class="lost-message">
            The network has many paths, but this one hasn't been connected yet.
            Let's get you back to where the connections run deep and the light is warm.
        </p>
        <a href="/" class="lost-home">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Return Home
        </a>
        <p class="lost-vine">"Even in the wild places, you're not lost — just exploring."</p>
    </div>
<script src="js/site.js"></script>
    <script src="/js/tts-player.js"></script>
</body>
</html>
